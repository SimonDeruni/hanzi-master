name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ "bypass-mlkit" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          
      - name: Generate Flutter Build Files
        run: |
          # This configures the iOS project without actually trying to compile it
          flutter build ios --config-only
          
      - name: Install Pods
        run: |
          cd ios
          pod install
          
      - name: Build Unsigned Archive
        run: |
          # Use "archive" instead of "build" to force Xcode 15 to ignore signing
          xcodebuild clean archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/unsigned.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" | tee xcodebuild.log || (echo "--- XCODEBUILD FAILED ---" && tail -n 150 xcodebuild.log && exit 1)
            
      - name: Package IPA for Sideloadly
        run: |
          # Find the compiled app inside the archive
          APP_PATH=$(find build/unsigned.xcarchive/Products/Applications -name "Runner.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found in archive! The compilation failed."
            exit 1
          fi
          
          # Verify the binary is actually inside
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "Runner binary is missing from inside the .app folder! Compilation failed."
            exit 1
          fi
          
          echo "Found compiled app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r HanziMaster.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HanziMaster-Unsigned-IPA
          path: HanziMaster.ipa
