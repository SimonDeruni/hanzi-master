name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ "bypass-mlkit" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          
      - name: Install Pods
        run: |
          cd ios
          pod install
          
      - name: Build Unsigned App (Direct Xcodebuild)
        run: |
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
            
      - name: Package IPA for Sideloadly
        run: |
          APP_PATH=$(find build/ios_build -name "Runner.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found! Xcode build failed."
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r HanziMaster.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HanziMaster-Unsigned-IPA
          path: HanziMaster.ipa
