name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ bypass-mlkit, master ]
  workflow_dispatch:  # allows manual trigger from GitHub website

jobs:
  build-ios:
    runs-on: macos-13  # Xcode 14.x — no signing required!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r HanziMaster.ipa Payload
          echo "✅ IPA created successfully!"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HanziMaster-iOS
          path: HanziMaster.ipa
          retention-days: 7
