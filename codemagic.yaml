workflows:
  ios-unsigned-build:
    name: Build iOS (Unsigned App for Sideloadly)
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Create .env file
        script: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> .env
      - name: Nuke all Xcode code signing
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS app
        script: |
          export FLUTTER_DISABLE_SWIFT_PACKAGE_MANAGER=true
          flutter build ios --release --no-codesign || true
          echo "=== Searching for Runner.app ==="
          find . -name "Runner.app" -type d 2>/dev/null || echo "Not found anywhere"
          echo "=== Build directory ==="
          ls -la build/ios/ 2>/dev/null || echo "No build/ios directory"
      - name: Package App for Download
        script: |
          APP_PATH=$(find . -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found Runner.app at: $APP_PATH"
            zip -r HanziMaster-Unsigned.zip "$APP_PATH"
            echo "SUCCESS: IPA packaged!"
          else
            echo "FAILED: Runner.app not found anywhere"
            exit 1
          fi
    artifacts:
      - HanziMaster-Unsigned.zip
