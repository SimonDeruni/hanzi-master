workflows:
  ios-unsigned-build:
    name: Build iOS (Unsigned App for Sideloadly)
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Create .env file
        script: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> .env
      - name: Nuke all Xcode code signing
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compile Dart code (step 1)
        script: |
          export FLUTTER_DISABLE_SWIFT_PACKAGE_MANAGER=true
          flutter build ios --release --no-codesign || true
          echo "Dart compilation done (xcode signing error expected and ignored)"
      - name: Build with xcodebuild directly (step 2)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME="" \
            -derivedDataPath build/DerivedData \
            build
      - name: Package App for Download
        script: |
          APP_PATH=$(find build/DerivedData -name "Runner.app" -type d 2>/dev/null | head -1)
          echo "Found Runner.app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/Runner.app
            zip -r HanziMaster-Unsigned.ipa Payload
            echo "SUCCESS: Packaged!"
          else
            echo "FAILED: Runner.app not found"
            exit 1
          fi
    artifacts:
      - HanziMaster-Unsigned.ipa
