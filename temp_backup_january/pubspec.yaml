name: hanzi_master
description: A mobile-first Chinese learning application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Chinese Features
  flutter_tts: ^4.2.5
  lpinyin: ^2.0.3
  path_drawing: ^1.0.1  # SVG path parsing for strokes

  # Utils
  fpdart: ^1.1.0
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.5.2
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.4
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.14.4"
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/data/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/icon/icon.png"
  android: true
  ios: true
  android_12:
    image: "assets/icon/icon.png"
    color: "#ffffff"
